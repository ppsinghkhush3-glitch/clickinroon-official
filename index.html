<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & SEO -->
    <title>ClickInRoom - Digital Marketing Agency</title>
    <meta
      name="description"
      content="Transform your hotel business with ClickInRoom's comprehensive digital solutions. Website development, SEO, digital marketing, and luxury hospitality services."
    />

    <!-- Open Graph (IMPORTANT: use absolute URL) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ClickInRoom - Premium Hotel Digital Solutions" />
    <meta
      property="og:description"
      content="India's premier hospitality digital solutions provider. Elevate your hotel's online presence and maximize revenue."
    />
    <meta property="og:image" content="https://yourdomain.com/logo.png" />
    <meta property="og:url" content="https://yourdomain.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ClickInRoom - Premium Hotel Digital Solutions" />
    <meta
      name="twitter:description"
      content="Transform your hotel business with cutting-edge digital marketing and web development."
    />
    <meta name="twitter:image" content="https://yourdomain.com/logo.png" />

    <!-- Optional: Theme color -->
    <meta name="theme-color" content="#000000" />
  </head>

  <body>
    <div id="root"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
